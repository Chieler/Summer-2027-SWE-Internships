<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    .source-nav { margin-bottom: 1.5rem; }
    .source-nav label { font-weight: 600; margin-right: 0.5rem; }
    .source-nav select { font-size: 1rem; padding: 0.4rem 0.6rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f5f5f5; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <div class="source-nav">
    <label for="source-switcher">Viewing:</label>
    <select id="source-switcher" onchange="if (this.value) window.location.href = this.value;">
      {% assign home_url = '/' | relative_url %}
      <option value="{{ home_url }}" {% if page.url == '/' %}selected{% endif %}>Home (all sources)</option>
      {% for src in site.data.sources %}
        {% assign src_path = '/sources/' | append: src.slug | append: '/' %}
        {% assign src_url = src_path | relative_url %}
        <option value="{{ src_url }}" {% if page.url == src_path %}selected{% endif %}>{{ src.label }} ({{ src.count }})</option>
      {% endfor %}
    </select>
  </div>

  {{ content }}
</body>
</html>
